[env]
EVA_TARGET_CHIP = "stm32f767zi"

[build]
target = "../stm32f767.json"

[target.thumbv7em-eva-eabihf]
runner = "probe-rs run --chip STM32F767ZITx"

[profile.releaseplus]
inherits = "release"
opt-level = 3
lto = true
codegen-units = 1

[unstable]
build-std = ["core", "alloc"]
build-std-features = ["compiler-builtins-mem"]